<!DOCTYPE html>
<html lang="fi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <title>HTML-laskin versio 1.0</title>
</head>

<body>
    <div class="container-md">
        <div class="d-flex justify-content-center">
            <h1>HTML-laskin versio 1.0</h1>
        </div>
        <div class="d-flex justify-content-center">
            <input class="input-group-text m-1"
                   type="text" 
                   id="display"
                   aria-label="Calculator display"
                   style="font-family: 'Courier New', monospace; width: 240px; height: 50px; font-size: 30px;"
                   readonly>
        </div>
        <div class="d-flex justify-content-center">
            <button type="button" class="btn btn-lg btn-outline-primary m-1" data-value="7">
                    <i class="bi bi-7-square"></i>
            </button>
            <button type="button" class="btn btn-lg btn-outline-primary m-1" data-value="8">
                    <i class="bi bi-8-square"></i>
            </button>
            <button type="button" class="btn btn-lg btn-outline-primary m-1" data-value="9">
                    <i class="bi bi-9-square"></i>
            </button>
            <button type="button" class="btn btn-lg btn-outline-primary m-1" data-value="/">
                    <i class="bi bi-slash"></i>
            </button>
        </div>
        <div class="d-flex justify-content-center">
            <button type="button" class="btn btn-lg btn-outline-primary m-1" data-value="4">
                    <i class="bi bi-4-square"></i>
            </button>
            <button type="button" class="btn btn-lg btn-outline-primary m-1" data-value="5">
                    <i class="bi bi-5-square"></i>
            </button>
            <button type="button" class="btn btn-lg btn-outline-primary m-1" data-value="6">
                    <i class="bi bi-6-square"></i>
            </button>
            <button type="button" class="btn btn-lg btn-outline-primary m-1" data-value="*">
                    <i class="bi bi-x"></i>
            </button>
        </div>
        <div class="d-flex justify-content-center">
            <button type="button" class="btn btn-lg btn-outline-primary m-1" data-value="1">
                    <i class="bi bi-1-square"></i>
            </button>
            <button type="button" class="btn btn-lg btn-outline-primary m-1" data-value="2">
                    <i class="bi bi-2-square"></i>
            </button>
            <button type="button" class="btn btn-lg btn-outline-primary m-1" data-value="3">
                    <i class="bi bi-3-square"></i>
            </button>
            <button type="button" class="btn btn-lg btn-outline-primary m-1" data-value="-">
                    <i class="bi bi-dash"></i>
            </button>
        </div>
        <div class="d-flex justify-content-center">
            <button type="button" class="btn btn-lg btn-outline-primary m-1" data-value="0">
                    <i class="bi bi-0-square"></i>
            </button>
            <button type="button" class="btn btn-lg btn-outline-primary m-1" data-value=".">
                    <i class="bi bi-dot"></i>
            </button>
            <button type="button" class="btn btn-lg btn-outline-primary m-1" data-action="backspace">
                    <i class="bi bi-backspace"></i>
            </button>
            <button type="button" class="btn btn-lg btn-outline-primary m-1" data-value="+">
                    <i class="bi bi-plus"></i>
            </button>
        </div>
        <div class="d-flex justify-content-center">
            <button type="button" class="btn btn-lg btn-outline-primary m-1" data-action="clear">
                    <i class="bi bi-c-circle"></i>
            </button>
            <button type="button" class="btn btn-lg btn-outline-primary m-1" data-value="(">
                    <i class="bi bi-chevron-compact-left"></i>
            </button>
            <button type="button" class="btn btn-lg btn-outline-primary m-1" data-value=")">
                    <i class="bi bi-chevron-compact-right"></i>
            </button>
            <button type="button" class="btn btn-lg btn-outline-primary m-1" data-action="calculate">
                    <i class="bi bi-arrow-return-left"></i>
            </button>
        </div>
    </div>

    <script src="index.js"></script>
        
</body>

</html>
